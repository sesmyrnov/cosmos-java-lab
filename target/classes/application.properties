# =============================================================================
# Cosmos DB Workshop Lab - Configuration
# =============================================================================
# IMPORTANT: Replace <YOUR_USER_ID> with your unique prefix (e.g., your alias)
# =============================================================================

# --- Option A: Local Emulator ---
# cosmos.endpoint=https://localhost:8081
# cosmos.key=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==
# cosmos.connection.mode=GATEWAY

# --- Option B: Shared Serverless Account ---
cosmos.endpoint=https://<SHARED_ACCOUNT_NAME>.documents.azure.com:443/
cosmos.key=<SHARED_ACCOUNT_KEY>
cosmos.connection.mode=DIRECT

# --- Entra ID Auth (alternative to key-based) ---
# cosmos.auth.type=ENTRA_ID
cosmos.auth.type=KEY

# --- Database name (use your unique prefix!) ---
cosmos.database=workshop_<YOUR_USER_ID>

# --- Container names ---
cosmos.container.stocks=stocks
cosmos.container.accounts=accounts
cosmos.container.timeseries=stock_time_series
cosmos.container.leases=leases
